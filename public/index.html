<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CropTab UI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="splash" id="splash">
      <div class="splash-stack">
        <div class="splash-box box-outer"></div>
        <div class="splash-box box-mid"></div>
        <div class="splash-box box-inner"></div>
        <img class="splash-logo" src="genlab-icon.svg" alt="GenLab logo" />
      </div>
    </div>

    <main class="hero hero-hidden" id="hero">
      <header class="topbar reveal d1">
        <button class="menu-btn" type="button">✶ MENU</button>
        <div class="brand">
          <img class="top-logo brand-logo" src="top-logo.png" alt="Farm Minerals logo" />
          <span>Farm Minerals</span>
        </div>
        <a class="contact-link" href="#">CONTACT US</a>
      </header>

      <section class="headline-row reveal d2">
        <h1>GenLab</h1>
        <a class="request-btn" href="#">REQUEST ACCESS</a>
      </section>

      <section class="mid-row reveal d3">
        <p class="subtitle">FERTILIZER, REINVENTED.</p>
        <p class="right-note">100 KG OF FERTILIZER <br />REIMAGINED AS A 3 G TABLET.</p>
      </section>

      <section class="content-row">
        <div class="left-copy reveal d4">
          <h2>For Your Crops.<br />For the Planet.</h2>
          <p>
            CARBON-CAPSULE TECHNOLOGY<br />
            THAT DELIVERS NUTRIENTS WITH<br />
            ZERO WASTE AND ZERO EMISSIONS.
          </p>
        </div>

        <div class="product-wrap reveal d5">
          <div class="tablet">
            <img class="rotating-logo" src="genlab-icon.svg" alt="GenLab logo" />
          </div>
        </div>
      </section>
    </main>
    <script src="splash.js"></script>
  </body>
</html>
